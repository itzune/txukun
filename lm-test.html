<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tier 2 LM Re-ranking Test — Ikasbil</title>
<style>
  body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
  .pass { color: #4ade80; } .fail { color: #f87171; }
  pre { background: #16213e; padding: 10px; border-radius: 5px; overflow-x: auto; }
</style>
</head>
<body>
<h1>Tier 2 LM Re-ranking Test — Ikasbil fill-the-gap</h1>
<p>Test cases from Ikasbil "Euskaldun berriari akatsak zuzentzen" exercise.</p>
<pre id="log">Loading...</pre>
<script type="module">
  import { initLM, lmRerank, isLMReady } from '/src/lm-rerank.js';

  const log = document.getElementById('log');
  function out(msg) { log.textContent += msg + '\n'; }

  const BASE = import.meta.env.BASE_URL || '/txukun/';
  const modelUrl = BASE + 'models/eu_futo_v2_nobos.gguf';

  // Ikasbil exercise: "Gertatutakoa kontatzen" (fill-the-gap, 3 options each)
  // Source: https://www.ikasbil.eus/documents/20928/15491438/1534219.pdf
  // Each case: left context before gap, 3 options, correct answer from answer key.
  const cases = [
    {
      ctx: 'Ezetz asmatu gaur',
      options: ['zer gertatu den', 'zer gertatu da', 'zer gertatu dion'],
      correct: 'zer gertatu den',
    },
    {
      ctx: 'Badakizu, batzuetan zalantzak izaten ditu',
      options: ['neska horrek', 'neska hori', 'neska horri'],
      correct: 'neska horrek',
    },
    {
      ctx: 'Mikel zuzentzen hasi zaio, eta',
      options: ['neskak aurpegi arraro oso', 'neskak oso aurpegi arraroa', 'neska aurpegi oso arraro'],
      correct: 'neskak oso aurpegi arraroa',
    },
    {
      ctx: 'berak lasai-lasai esan dio',
      options: ['eskerrak ematen dizkion', 'eskerrak ematen dizkiola', 'eskerrak eman dizkio'],
      correct: 'eskerrak ematen dizkiola',
    },
    {
      ctx: 'Miren asko haserretu da eta eskatu dio jendearen aurrean',
      options: ['ez zuzentzea', 'ez zuzentzeko', 'ez diola zuzendu'],
      correct: 'ez zuzentzeko',
    },
    {
      ctx: 'Nire ustez,',
      options: ['Mikelek arrazoi duela', 'Mikelek arrazoi du', 'Mikel arrazoi duela'],
      correct: 'Mikelek arrazoi du',
    },
    {
      ctx: 'bere neska-laguna',
      options: ['asko saiatzen da', 'asko saiatzen du', 'asko ahalegintzen du'],
      correct: 'asko saiatzen da',
    },
    {
      ctx: 'abisatu dio Aneri hurrengoan',
      options: ['ez diola ezer zuzenduko', 'ez omen diola ezer zuzenduko', 'ez dio ezer zuzenduko'],
      correct: 'ez diola ezer zuzenduko',
    },
  ];

  out('Loading model from: ' + modelUrl);
  try {
    await initLM(modelUrl);
    out('Model loaded: ' + isLMReady());
    out('Running ' + cases.length + ' Ikasbil test cases...\n');

    let correct = 0;
    for (const { ctx, options, correct: right } of cases) {
      const scores = await lmRerank(ctx, options);
      const maxScore = Math.max(...scores);
      const winner = options[scores.indexOf(maxScore)];
      const ok = winner === right;
      if (ok) correct++;
      const sym = ok ? '✓' : '✗';
      out(`${sym} ${ctx.slice(0, 40).padEnd(42)} → ${winner.slice(0, 25).padEnd(27)} (want ${right.slice(0, 25)})`);
      out(`    ${options.map((c, i) => `${c.slice(0, 20)}=${scores[i].toFixed(3)}`).join('  ')}`);
    }
    out(`\nResult: ${correct}/${cases.length} correct`);
  } catch (err) {
    out('ERROR: ' + err.message);
    console.error(err);
  }
</script>
</body>
</html>
