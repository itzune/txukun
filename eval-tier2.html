<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tier 2 LM Re-ranking Evaluation</title>
<style>
  body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; max-width: 1200px; }
  .pass { color: #4ade80; } .fail { color: #f87171; } .info { color: #60a5fa; }
  pre { background: #16213e; padding: 10px; border-radius: 5px; overflow-x: auto; font-size: 12px; }
  #progress { color: #60a5fa; margin: 10px 0; }
</style>
</head>
<body>
<h1>Tier 2 LM Re-ranking Evaluation</h1>
<p>Tests whether LM surprisal re-ranking improves on Tier 1 frequency ranking.</p>
<div id="progress">Waiting for test data...</div>
<pre id="log"></pre>
<script type="module">
  import { initLM, lmRerank, isLMReady, isLMFailed, LM_WEIGHT } from '/src/lm-rerank.js';

  const log = document.getElementById('log');
  const progress = document.getElementById('progress');
  function out(msg) { log.textContent += msg + '\n'; }

  // Test data is injected by Playwright (window.__tier2Inputs).
  // For manual testing, can also fetch from URL.
  let inputs = window.__tier2Inputs;
  if (!inputs) {
    progress.textContent = 'No test data injected. Set window.__tier2Inputs.';
    throw new Error('No test data');
  }

  const BASE = import.meta.env.BASE_URL || '/txukun/';
  const modelUrl = BASE + 'models/eu_futo_v2_nobos.gguf';

  out(`Test cases: ${inputs.length}`);
  out(`LM_WEIGHT: ${LM_WEIGHT}`);
  out(`Loading model from: ${modelUrl}`);
  progress.textContent = 'Loading model...';

  try {
    await initLM(modelUrl);
    if (!isLMReady()) {
      out('ERROR: Model failed to load');
      window.__tier2Complete = true;
      window.__tier2Results = { error: 'Model failed to load' };
      throw new Error('Model failed');
    }
    out('Model loaded successfully\n');
    progress.textContent = `Evaluating 0/${inputs.length}...`;

    let tier1Correct = 0;
    let tier2Correct = 0;
    let tier2Changed = 0;      // Tier 2 picked a different candidate than Tier 1
    let tier2Improved = 0;     // Tier 1 wrong в†’ Tier 2 correct
    let tier2Worsened = 0;     // Tier 1 correct в†’ Tier 2 wrong
    let lmFallback = 0;        // LM returned all 0s (fallback to Tier 1)
    const failures = [];

    for (let i = 0; i < inputs.length; i++) {
      const tc = inputs[i];
      const candidateWords = tc.candidates.map(c => c.word.toLowerCase());
      const correctLower = tc.correct.toLowerCase();

      // Tier 1 top-1
      const tier1Top = tc.candidates[0]?.word.toLowerCase() || '';
      const tier1WasCorrect = tier1Top === correctLower;
      if (tier1WasCorrect) tier1Correct++;

      // Tier 2: LM re-ranking
      const surprisals = await lmRerank(tc.context, candidateWords);

      // Check if LM returned all 0s (fallback)
      const allZero = surprisals.every(s => s === 0);
      if (allZero) lmFallback++;

      // Combined score = tier1_score + LM_WEIGHT * surprisal
      let bestCombined = -Infinity;
      let tier2TopIdx = 0;
      for (let j = 0; j < tc.candidates.length && j < surprisals.length; j++) {
        const combined = tc.candidates[j].score + LM_WEIGHT * surprisals[j];
        if (combined > bestCombined) {
          bestCombined = combined;
          tier2TopIdx = j;
        }
      }
      const tier2Top = tc.candidates[tier2TopIdx]?.word.toLowerCase() || '';
      const tier2WasCorrect = tier2Top === correctLower;
      if (tier2WasCorrect) tier2Correct++;

      // Track changes
      if (tier2TopIdx !== 0) tier2Changed++;
      if (!tier1WasCorrect && tier2WasCorrect) tier2Improved++;
      if (tier1WasCorrect && !tier2WasCorrect) tier2Worsened++;

      // Track failures (Tier 2 misses)
      if (!tier2WasCorrect && failures.length < 20) {
        failures.push({
          typo: tc.typo,
          correct: tc.correct,
          context: tc.context.slice(0, 50),
          tier1Top: tc.candidates[0]?.word,
          tier2Top: tc.candidates[tier2TopIdx]?.word,
          tier1WasCorrect,
          allZero,
          candidates: tc.candidates.slice(0, 5).map((c, j) => ({
            word: c.word, tier1: c.score.toFixed(2), surprisal: surprisals[j]?.toFixed(2),
            combined: (c.score + LM_WEIGHT * (surprisals[j] || 0)).toFixed(2),
          })),
        });
      }

      // Progress update every 10 cases
      if ((i + 1) % 10 === 0 || i === inputs.length - 1) {
        progress.textContent = `Evaluating ${i + 1}/${inputs.length}... | T1: ${tier1Correct} T2: ${tier2Correct} | improved: ${tier2Improved} worsened: ${tier2Worsened} fallback: ${lmFallback}`;
      }
    }

    // Final results
    out('\nв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ');
    out('  TIER 2 EVALUATION RESULTS');
    out('в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ\n');
    out(`  Total cases:          ${inputs.length}`);
    out(`  Tier 1 top-1 correct: ${tier1Correct}  (${(tier1Correct/inputs.length*100).toFixed(1)}%)`);
    out(`  Tier 2 top-1 correct: ${tier2Correct}  (${(tier2Correct/inputs.length*100).toFixed(1)}%)`);
    out(`  Tier 2 changed rank:  ${tier2Changed}  (${(tier2Changed/inputs.length*100).toFixed(1)}%)`);
    out(`  LM fallback (all 0):  ${lmFallback}  (${(lmFallback/inputs.length*100).toFixed(1)}%)`);
    out(`  Improved (T1вњ—в†’T2вњ“):   ${tier2Improved}`);
    out(`  Worsened (T1вњ“в†’T2вњ—):   ${tier2Worsened}`);
    out(`  Net improvement:      ${tier2Improved - tier2Worsened} cases`);

    if (failures.length > 0) {
      out('\n  --- Sample Tier 2 failures ---');
      for (const f of failures.slice(0, 10)) {
        out(`    ${f.typo} в†’ want ${f.correct} | T1: ${f.tier1Top} T2: ${f.tier2Top} | ctx: ${f.context}...`);
        for (const c of f.candidates) {
          out(`      ${c.word.padEnd(15)} tier1=${c.tier1} surprisal=${c.surprisal} combined=${c.combined}`);
        }
      }
    }

    out('\nв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ');
    out('  Done.');
    out('в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ\n');

    // Signal completion for Playwright
    window.__tier2Complete = true;
    window.__tier2Results = {
      total: inputs.length,
      tier1Correct,
      tier2Correct,
      tier2Changed,
      lmFallback,
      tier2Improved,
      tier2Worsened,
      netImprovement: tier2Improved - tier2Worsened,
      lmWeight: LM_WEIGHT,
    };

    progress.textContent = `COMPLETE | T1: ${tier1Correct}/${inputs.length} (${(tier1Correct/inputs.length*100).toFixed(1)}%) в†’ T2: ${tier2Correct}/${inputs.length} (${(tier2Correct/inputs.length*100).toFixed(1)}%) | net: +${tier2Improved - tier2Worsened}`;
  } catch (err) {
    out('ERROR: ' + err.message);
    console.error(err);
    window.__tier2Complete = true;
    window.__tier2Results = { error: err.message };
    progress.textContent = 'ERROR: ' + err.message;
  }
</script>
</body>
</html>
